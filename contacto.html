    <!-- INICIO DEL CONTACTO -->
    <article
      class="container formulario flex-grow-1 d-flex flex-column justify-content-center"
    >
      <form action="#" method="post" class="form">
        <section class="row">
          <section class="col-sx-12 col-sm-6 col-md-6">
            <img src="img/contacto.jpg" alt="" class="img-fluid" />
          </section>

          <section class="col-sx-12 col-sm-6 col-md-6">
            <label>Nombre:</label>
            <input
              type="text"
              class="input"
              placeholder="Ingrese su nombre"
              required
            />

            <label>Correo:</label>
            <input
              type="mail"
              class="input"
              placeholder="Ingrese su correo"
              required
            />

            <label>Celular:</label>
            <input
              type="tel"
              class="input"
              placeholder="Ingrese su celular"
              required
            />

            <textarea
              placeholder="Ingrese su mensaje"
              class="caja"
              required
            ></textarea>
            <input type="submit" class="botonContacto" />
          </section>
        </section>
      </form>
    </article>
    <!-- FIN DEL CONTACTO -->

    <!-- INICIO DEL FOOTER -->
    <footer class="bg-black text-white pt-5 mt-auto">
      <div class="container footer">
        <div class="row">

              <div class="small text-secondary">devlab.pe@gmail.com</div>
            </div>
          </div>

          <div
            class="col-md-4 d-flex align-items-center justify-content-center justify-content-md-end mb-4 iconFooter"
