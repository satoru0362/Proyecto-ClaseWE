    <!-- INICIO DEL REGISTRO -->
    <div class="card-registro shadow-lg">
      <h2 class="titulo-principal text-center">
        Regístrate aquí para más información
      </h2>
      <p class="subtitulo mb-4">Te contactaremos a la brevedad.</p>

      <form action="#" method="post">
        <div class="mb-3">
          <select class="form-select custom-input" required>
            <option value="" selected disabled>
              ¿Qué producto te interesa?
            </option>
            <option value="1">Carreras</option>
            <option value="2">Diplomados</option>
            <option value="3">Cursos</option>
          </select>
        </div>

        <div class="mb-3">
          <select class="form-select custom-input" required>
            <option value="" selected disabled>
              ¿Qué carrera te gustaria estudiar?
            </option>
            <option value="1">Ingeniería Civil</option>
            <option value="2">Ingeniería Industrial</option>
            <option value="3">Ingeniería de Sistemas</option>
            <option value="4">Ingeniería Mecánica</option>
            <option value="5">Ingeniería Electrónica</option>
            <option value="6">Ingeniería Ambiental</option>
            <option value="7">Ingeniería Biomédica</option>
            <option value="8">Ingeniería de Telecomunicaciones</option>
          </select>
        </div>

        <div class="mb-3">
          <select class="form-select custom-input" required>
            <option value="" selected disabled>Elige el campus</option>
            <option value="1">Lima Norte</option>
            <option value="2">Lima Sur</option>
            <option value="3">Lima Este</option>
            <option value="4">Lima Oeste</option>
            <option value="5">Lima Arequipa</option>
            <option value="6">Lima Trujillo</option>
          </select>
        </div>

        <div class="mb-3">
          <input
            type="text"
            class="form-control custom-input"
            placeholder="Apellidos y Nombres"
            required
          />
        </div>

        <div class="mb-3">
          <input
            type="email"
            class="form-control custom-input"
            placeholder="Correo electrónico"
            required
          />
        </div>

        <div class="mb-4">
          <input
            type="tel"
            class="form-control custom-input"
            placeholder="Celular"
            required
          />
        </div>

        <p class="etiqueta-radio mb-2">¿Cómo nos comunicamos contigo?</p>
        <div class="row mb-4 comunicacion">
          <div class="col-6">
            <div class="form-check custom-radio">
              <input
                class="form-check-input"
                type="radio"
                name="comunicacion"
                id="radioWhatsApp"
                required
              />
              <label class="form-check-label" for="radioWhatsApp">
                WhatsApp
              </label>
            </div>
          </div>
          <div class="col-6">
            <div class="form-check custom-radio">
              <input
                class="form-check-input"
                type="radio"
                name="comunicacion"
                id="radioLlamada"
              />
              <label class="form-check-label" for="radioLlamada">
                LLamada
              </label>
            </div>
          </div>
        </div>

        <div class="form-check mb-4 custom-checkbox">
          <input
            class="form-check-input"
            type="checkbox"
            id="checkTerminos"
            required
          />
          <label class="form-check-label" for="checkTerminos">
            Acepto las
            <a href="#" class="enlace-rojo">políticas de privacidad</a> y los
            <a href="#" class="enlace-rojo">términos y condiciones.</a>
          </label>
        </div>

        <button type="submit" class="btn btn-enviar w-100">Enviar</button>
      </form>
    </div>
    <!-- FIN DEL REGISTRO -->

    <!-- IMPORTAR JS ANTES DEL CIERRE DEL BODY -->
